[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
# oracle/parity are opt-in (run with `-m oracle` or `-m parity`). They cross-
# validate the scripts/GPU/ai heuristic engine against assets/js and have a
# known, long-standing first-edge-touch gating divergence (Python gates the
# +420/+455 bonus behind training knobs; JS always awards it) — failing since
# the initial import. They are NOT the AlphaZero engine; excluded from the
# default run by design (their marker docstrings already say "opt-in").
addopts = -v --tb=short -m "not integration and not oracle and not parity"
filterwarnings =
    ignore::DeprecationWarning
markers =
    slow: marks tests as slow (deselect with '-m "not slow"')
    slow_live: opt-in live tests that hit real models or long-running pipelines
    oracle: marks tests that require Node.js for JS oracle (opt-in via -m oracle; excluded by default)
    bridge: marks bridge crossing tests
    sealed_lane: marks sealed lane tests
    phase1: marks Phase 1 geometry tests
    phase2: marks Phase 2 bitmask tests
    integration: marks tests as integration (opt-in via -m integration; excluded by default)
    parity: marks deterministic Python-vs-JS engine parity tests (opt-in via -m parity)
