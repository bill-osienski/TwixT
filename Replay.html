<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TwixT Replay</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <style>
      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: Georgia, 'Times New Roman', serif;
        background: radial-gradient(circle at top, #2f2d2a 0%, #1b1a18 60%);
        color: #f5efe7;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
      }

      #replay-container {
        width: 95vw;
        max-width: 1300px;
        height: 92vh;
        display: grid;
        grid-template-columns: 1.2fr 0.8fr;
        gap: 20px;
      }

      #canvas {
        position: relative;
        border-radius: 18px;
        overflow: hidden;
        background: #101010;
        box-shadow: 0 18px 50px rgba(0, 0, 0, 0.55);
      }

      #three-canvas {
        width: 100%;
        height: 100%;
        display: block;
      }

      .panel {
        background: rgba(245, 239, 231, 0.08);
        border: 1px solid rgba(245, 239, 231, 0.15);
        border-radius: 18px;
        padding: 20px;
        display: flex;
        flex-direction: column;
        gap: 16px;
        height: 100%;
      }

      .title {
        font-size: 2rem;
        letter-spacing: 1px;
        margin: 0;
      }

      .subtle {
        font-size: 0.9rem;
        color: rgba(245, 239, 231, 0.7);
      }

      .meta {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 8px 14px;
        font-size: 0.95rem;
      }

      .meta span {
        color: rgba(245, 239, 231, 0.7);
      }

      .controls {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
      }

      button,
      input[type='file'],
      select {
        font-family: inherit;
        border: none;
        border-radius: 12px;
        padding: 10px 14px;
        background: rgba(245, 239, 231, 0.12);
        color: #f5efe7;
        cursor: pointer;
        transition: 0.2s ease;
      }

      button:hover,
      select:hover {
        background: rgba(245, 239, 231, 0.2);
      }

      button:disabled {
        opacity: 0.4;
        cursor: not-allowed;
      }

      .slider {
        width: 100%;
      }

      .status {
        background: rgba(245, 239, 231, 0.08);
        border-radius: 12px;
        padding: 10px 14px;
        font-size: 0.95rem;
      }

      @media (max-width: 960px) {
        #replay-container {
          grid-template-columns: 1fr;
          height: auto;
        }
        #canvas {
          height: 60vh;
        }
      }
    </style>
  </head>
  <body>
    <div id="replay-container">
      <div id="canvas">
        <canvas id="three-canvas"></canvas>
      </div>
      <div class="panel">
        <div>
          <h1 class="title">Replay Viewer</h1>
          <div class="subtle">
            Load a replay JSON to step through moves visually.
          </div>
        </div>

        <input id="file-input" type="file" accept=".json" />

        <div class="controls">
          <button id="btn-prev">Prev</button>
          <button id="btn-play">Play</button>
          <button id="btn-next">Next</button>
          <select id="speed">
            <option value="1200">0.8x</option>
            <option value="900">1x</option>
            <option value="600">1.5x</option>
            <option value="350">2x</option>
          </select>
        </div>

        <input id="turn-slider" class="slider" type="range" min="0" max="0" value="0" />

        <div class="status" id="status-text">No replay loaded.</div>

        <div class="meta" id="meta">
          <div><span>Winner</span> <strong id="meta-winner">-</strong></div>
          <div><span>Reason</span> <strong id="meta-reason">-</strong></div>
          <div><span>Total Moves</span> <strong id="meta-moves">-</strong></div>
          <div><span>Seed</span> <strong id="meta-seed">-</strong></div>
          <div><span>Depth</span> <strong id="meta-depth">-</strong></div>
          <div><span>Start</span> <strong id="meta-start">-</strong></div>
        </div>
      </div>
    </div>

    <script type="module" src="./assets/js/replay/replayController.js"></script>
  </body>
</html>
